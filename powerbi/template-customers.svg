<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900">
  <defs>
    <style>
      .h-title   { font-family: 'Segoe UI', sans-serif; font-size: 20px; font-weight: 700; fill: #F1F5F9; }
      .h-sub     { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #64748B; }
      .s-title   { font-family: 'Segoe UI', sans-serif; font-size: 13px; font-weight: 600; fill: #F1F5F9; }
      .s-sub     { font-family: 'Segoe UI', sans-serif; font-size: 10px; fill: #64748B; }
      .kpi-label { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #64748B; }
      .ph        { font-family: 'Segoe UI', sans-serif; font-size: 12px; font-style: italic; fill: #374151; }
    </style>
  </defs>

  <!-- ── Background ───────────────────────────────────────── -->
  <rect width="1440" height="900" fill="#0F1117"/>

  <!-- ── Header ───────────────────────────────────────────── -->
  <rect x="0" y="0" width="1440" height="66" fill="#141924"/>
  <rect x="0" y="0" width="4"    height="66" fill="#38BDF8"/>
  <text x="24" y="28" class="h-title">Ecommerce Data Platform</text>
  <text x="24" y="50" class="h-sub">Customers</text>
  <rect x="0" y="66" width="1440" height="2" fill="#38BDF8" opacity="0.35"/>

  <!-- ── KPI Cards (y=76 h=120) — 3 cards ─────────────────── -->

  <!-- KPI 1 — Total Customers -->
  <rect x="20"  y="76" width="458" height="120" rx="3" fill="#1E2435"/>
  <rect x="20"  y="192" width="458" height="4"         fill="#38BDF8"/>
  <text x="249" y="138" class="kpi-label" text-anchor="middle">Total Customers</text>

  <!-- KPI 2 — Repeat Customer Rate -->
  <rect x="490" y="76" width="458" height="120" rx="3" fill="#1E2435"/>
  <rect x="490" y="192" width="458" height="4"         fill="#F59E0B"/>
  <text x="719" y="138" class="kpi-label" text-anchor="middle">Repeat Customer Rate</text>

  <!-- KPI 3 — Avg Lifetime Value -->
  <rect x="962" y="76" width="458" height="120" rx="3" fill="#1E2435"/>
  <rect x="962" y="192" width="458" height="4"         fill="#34D399"/>
  <text x="1191" y="138" class="kpi-label" text-anchor="middle">Avg Lifetime Value</text>

  <!-- ── Charts Row (y=206 h=380) ─────────────────────────── -->

  <!-- Bar Chart — Top 10 Customers by LTV -->
  <rect x="20"  y="206" width="700" height="380" rx="3" fill="#1A1F2C"/>
  <rect x="20"  y="206" width="700" height="36"         fill="#141924"/>
  <rect x="20"  y="206" width="3"   height="36"         fill="#38BDF8"/>
  <text x="35"  y="222" class="s-title">Top 10 Customers by Lifetime Value</text>
  <text x="35"  y="235" class="s-sub">Horizontal bar — sorted by revenue</text>
  <text x="370" y="414" class="ph" text-anchor="middle">Bar Chart — Customer Lifetime Value</text>

  <!-- Donut — Customer Segments -->
  <rect x="740"  y="206" width="680" height="380" rx="3" fill="#1A1F2C"/>
  <rect x="740"  y="206" width="680" height="36"         fill="#141924"/>
  <rect x="740"  y="206" width="3"   height="36"         fill="#34D399"/>
  <text x="755"  y="222" class="s-title">Customer Segments</text>
  <text x="755"  y="235" class="s-sub">Repeat vs One-Time Customers</text>
  <text x="1080" y="414" class="ph" text-anchor="middle">Donut Chart</text>

  <!-- ── Table Row (y=596 h=284) ──────────────────────────── -->

  <!-- Customer Table -->
  <rect x="20"   y="596" width="1400" height="284" rx="3" fill="#1A1F2C"/>
  <rect x="20"   y="596" width="1400" height="36"         fill="#141924"/>
  <rect x="20"   y="596" width="3"    height="36"         fill="#A78BFA"/>
  <text x="35"   y="612" class="s-title">Customer Detail</text>
  <text x="35"   y="625" class="s-sub">customer_id · total_orders · lifetime_value — data bars on revenue</text>
  <text x="720"  y="756" class="ph" text-anchor="middle">Table — Customer ID · Total Orders · Lifetime Value</text>
</svg>
